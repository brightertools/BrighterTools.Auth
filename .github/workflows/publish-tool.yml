name: publish-tool

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version override (for example 1.0.1)
        required: false
        type: string
      publish_to_nuget:
        description: Publish the generated NuGet package to nuget.org
        required: true
        default: false
        type: boolean
      publish_to_npm:
        description: Publish the React companion package to npm
        required: true
        default: false
        type: boolean

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use trusted-publishing capable npm
        run: npm install -g npm@latest

      - name: Show npm runtime
        run: |
          node --version
          npm --version

      - name: Restore
        run: dotnet restore ./BrighterTools.Auth.sln --configfile ./NuGet.config

      - name: Build
        run: dotnet build ./BrighterTools.Auth.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test ./BrighterTools.Auth.sln --configuration Release --no-build --verbosity normal

      - name: Install React companion dependencies
        working-directory: ./react/brightertools-auth-react
        run: npm install

      - name: Test React companion package
        working-directory: ./react/brightertools-auth-react
        run: npm test

      - name: Build React companion package
        working-directory: ./react/brightertools-auth-react
        run: npm run build

      - name: Pack React companion package
        working-directory: ./react/brightertools-auth-react
        run: |
          mkdir -p ../../artifacts/npm
          npm pack --pack-destination ../../artifacts/npm

      - name: Pack NuGet package
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            dotnet pack ./src/BrighterTools.Auth/BrighterTools.Auth.csproj --configuration Release --no-build --output ./artifacts/nuget --configfile ./NuGet.config /p:Version=${{ inputs.version }}
          else
            dotnet pack ./src/BrighterTools.Auth/BrighterTools.Auth.csproj --configuration Release --no-build --output ./artifacts/nuget --configfile ./NuGet.config
          fi

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brightertools-auth-nuget
          path: ./artifacts/nuget/*
          if-no-files-found: error

      - name: Upload npm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brightertools-auth-npm
          path: ./artifacts/npm/*
          if-no-files-found: error

      - name: NuGet login (OIDC to temp API key)
        if: ${{ inputs.publish_to_nuget }}
        uses: NuGet/login@v1
        id: login
        with:
          user: brightertools

      - name: Publish to NuGet with Trusted Publishing
        if: ${{ inputs.publish_to_nuget }}
        run: dotnet nuget push ./artifacts/nuget/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish React companion to npm with Trusted Publishing
        if: ${{ inputs.publish_to_npm }}
        working-directory: ./react/brightertools-auth-react
        run: npm publish --provenance
